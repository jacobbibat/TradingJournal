<h1>Delete Screenshot</h1>

<p>Are you sure you want to delete this screenshot?</p>

<img src="{{ screenshot.image.url }}" width="300">

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<p>
    <a href="{% url 'trade_detail' screenshot.trade.id %}">Cancel</a>
</p>

{% extends 'tracker/base.html' %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center">

    <div class="bg-white shadow-sm border rounded-xl p-8 w-full max-w-2xl">

        <h1 class="text-2xl font-bold mb-6 text-center">
            Log New Trade
        </h1>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                class="w-full bg-slate-900 text-white py-2 rounded-lg hover:bg-slate-700 transition">
                Save Trade
            </button>
        </form>

        <!-- Back link -->
        <div class="mt-6 text-center">
            <a href="{% url 'trade_list' %}"
               class="text-sm text-blue-600 hover:underline">
                ← Back to Trade History
            </a>
        </div>

    </div>

</div>

{% endblock %}

<h1>Delete Trade</h1>

<p>Are you sure you want to delete this trade?</p>

<p>
    <strong>{{ trade.asset.symbol }}</strong> -
    {{ trade.trade_type }} -
    {{ trade.trade_date }}
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<p>
    <a href="{% url 'trade_detail' trade.id %}">Cancel</a>
</p>

{% extends 'tracker/base.html' %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center">

    <div class="bg-white shadow-sm border rounded-xl p-8 w-full max-w-md">

        <h1 class="text-2xl font-bold text-center mb-6">Login</h1>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-me font-medium text-slate-700 mb-1">
                    Username
                </label>
                {{ form.username }}
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Password
                </label>
                {{ form.password }}
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full bg-slate-900 text-white py-2 rounded-lg hover:bg-slate-700 transition">
                Login
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-sm text-slate-500">
                Don’t have an account?
            </p>
            <a href="{% url 'register' %}"
            class="inline-block mt-2 text-blue-600 hover:underline">
                Create an account
            </a>
        </div>
    </div>
</div>

{% endblock %}
